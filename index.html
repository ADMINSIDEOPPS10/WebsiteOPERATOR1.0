<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERATOR1.0 | COMMAND PANEL</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/h1pDjAx.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'VT323', monospace;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(25,25,25,0.95);
            border: 3px solid #555;
        }

        header {
            text-align: center;
            border-bottom: 3px solid #666;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .title {
            font-family: 'Press Start 2P', cursive;
            font-size: 3.8rem;
            color: #ddd;
            text-shadow: 0 0 15px #666;
            letter-spacing: 6px;
        }

        .subtitle { color: #888; font-size: 1.6rem; letter-spacing: 3px; }

        .panel {
            background: #1a1a1a;
            border: 2px solid #555;
            padding: 25px;
            margin-bottom: 25px;
        }

        .status-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .status-btn {
            background: #222;
            border: 2px solid #555;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .status-btn:hover, .status-btn.active {
            border-color: #aaa;
            background: #333;
            transform: scale(1.08);
        }

        .status-btn img {
            width: 50px;
            height: 50px;
            image-rendering: pixelated;
        }

        textarea {
            width: 100%;
            height: 140px;
            background: #111;
            border: 2px solid #666;
            color: #eee;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            padding: 15px;
        }

        button {
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.35rem;
            background: #1f1f1f;
            color: #ddd;
            border: 3px solid #777;
            cursor: pointer;
        }

        button:hover {
            background: #333;
            border-color: #aaa;
        }

        .website-btn {
            background: #003300;
            border: 3px solid #00aa00;
            color: #00ff88;
            margin-top: 10px;
        }

        .website-btn:hover {
            background: #005500;
            border-color: #00ff00;
        }

        .status { margin-top: 15px; text-align: center; font-size: 1.4rem; }
        .success { color: #00ff88; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="title">OPERATOR1.0</div>
            <div class="subtitle">COMMAND & CONTROL PANEL</div>
        </header>

        <div class="panel">
            <h2 style="color:#bbb; text-align:center; margin-bottom:15px;">DISCORD STATUS DISPATCH</h2>

            <div class="status-buttons">
                <div class="status-btn active" data-name="Online" data-emoji="https://cdn.discordapp.com/emojis/1354898116502884523.webp?size=64">
                    <img src="https://cdn.discordapp.com/emojis/1354898116502884523.webp?size=64" alt="Online">
                    <span>ONLINE</span>
                </div>
                <div class="status-btn" data-name="Offline" data-emoji="https://cdn.discordapp.com/emojis/1354898017773289735.webp?size=64">
                    <img src="https://cdn.discordapp.com/emojis/1354898017773289735.webp?size=64" alt="Offline">
                    <span>OFFLINE</span>
                </div>
                <div class="status-btn" data-name="Maintenance" data-emoji="https://cdn.discordapp.com/emojis/1354898104079618127.webp?size=64">
                    <img src="https://cdn.discordapp.com/emojis/1354898104079618127.webp?size=64" alt="Maintenance">
                    <span>MAINTENANCE</span>
                </div>
                <div class="status-btn" data-name="Loading" data-emoji="https://cdn.discordapp.com/emojis/1354898055706706160.webp?size=64&animated=true">
                    <img src="https://cdn.discordapp.com/emojis/1354898055706706160.webp?size=64&animated=true" alt="Loading">
                    <span>LOADING</span>
                </div>
            </div>

            <textarea id="message" placeholder="Additional message (optional)"></textarea>
            
            <button onclick="sendToDiscord()">TRANSMIT TO DISCORD</button>
        </div>

        <!-- Website Button -->
        <div class="panel" style="text-align: center;">
            <a href="https://operator10-clan.github.io/OPERATOR1.0/" target="_blank">
                <button class="website-btn">🌐 GO TO PUBLIC WEBSITE</button>
            </a>
        </div>

        <div id="result" class="status"></div>

        <div style="text-align:center; color:#666; font-size:1.2rem; margin-top:20px;">
            Authorized Personnel Only • Tier 1 Clearance Required
        </div>
    </div>

    <script>
        let selectedEmoji = "https://cdn.discordapp.com/emojis/1354898116502884523.webp?size=64";

        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedEmoji = btn.getAttribute('data-emoji');
            });
        });

        async function sendToDiscord() {
            const messageInput = document.getElementById('message');
            const resultDiv = document.getElementById('result');
            const custom = messageInput.value.trim();

            const websiteLink = "https://operator10-clan.github.io/OPERATOR1.0/";

            let baseMessage = "";
            const activeBtn = document.querySelector('.status-btn.active');
            const statusName = activeBtn ? activeBtn.getAttribute('data-name') : "Status";

            if (statusName === "Online") {
                baseMessage = `✅ Website is now **ONLINE** and fully operational.\n\n🔗 ${websiteLink}`;
            } else if (statusName === "Offline") {
                baseMessage = `🔴 Website is currently **OFFLINE**.\n\n🔗 ${websiteLink}`;
            } else if (statusName === "Maintenance") {
                baseMessage = `🛠️ Website is **UNDER MAINTENANCE**. Please stand by.\n\n🔗 ${websiteLink}`;
            } else if (statusName === "Loading") {
                baseMessage = `⏳ Website is **LOADING** / Initializing...\n\n🔗 ${websiteLink}`;
            }

            const finalMessage = custom ? `${baseMessage}\n\n${custom}` : baseMessage;

            const webhookURL = "https://discord.com/api/webhooks/1508489317914513520/3qkO5HGEjmkaFsMjqhZiwbfEiOQM0AtRHoVGn7Okad20k1DZra05J1t5ORg08oMp_SNY";

            const payload = {
                username: "OPERATOR1.0 Command",
                avatar_url: "https://i.imgur.com/h1pDjAx.png",
                embeds: [{
                    title: "OPERATOR1.0 STATUS UPDATE",
                    description: finalMessage,
                    color: 0x555555,
                    timestamp: new Date().toISOString(),
                    thumbnail: { url: selectedEmoji }
                }]
            };

            try {
                const response = await fetch(webhookURL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    resultDiv.innerHTML = `<span class="success">✅ STATUS SUCCESSFULLY SENT</span>`;
                    messageInput.value = "";
                } else {
                    resultDiv.innerHTML = `<span class="error">Failed to send.</span>`;
                }
            } catch (e) {
                resultDiv.innerHTML = `<span class="error">Connection error.</span>`;
            }
        }
    </script>
</body>
</html>
